name: Daily Analytics Collect

on:
  schedule:
    # 7:00 AM Moscow time (UTC+3) = 04:00 UTC
    - cron: '0 4 * * *'
    # Allows manual run from GitHub UI (button "Run workflow")

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
        run: python collect.py --also-yesterday

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add easyfast_ranks_history.csv easyfast_dashboard.html collect.py
          git diff --cached --quiet || git commit -m "chore: daily analytics $(date '+%Y-%m-%d')"
          git push
