name: Daily Analytics Collect

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  permissions:
    contents: write
    

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
        run: python collect.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add easyfast_ranks_history.csv easyfast_dashboard.html
          git diff --cached --quiet || git commit -m "chore: daily analytics $(date '+%Y-%m-%d')"
          git push
