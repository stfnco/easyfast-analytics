<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easyfast ‚Äî Rank Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-x: clip; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; background: #fff; color: #111; min-height: 100vh; overflow-x: clip; max-width: 1600px; margin: 0 auto; }

  /* ‚îÄ‚îÄ Tokens ‚îÄ‚îÄ */
  :root { --px: 48px; }
  @media (max-width: 767px) { :root { --px: 20px; } }

  /* ‚îÄ‚îÄ Header ‚îÄ‚îÄ */
  .header { padding: 32px var(--px) 20px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-left .sub { font-size: 13px; color: #aaa; margin-top: 4px; word-break: break-word; }
  .csv-drop { border: 1.5px dashed #ddd; border-radius: 10px; padding: 9px 16px; font-size: 12px; color: #aaa; cursor: pointer; transition: all 0.2s; text-align: center; }
  .csv-drop:hover, .csv-drop.dragover { border-color: #999; color: #666; background: #fafafa; }
  .csv-drop input { display: none; }

  /* ‚îÄ‚îÄ Stats ‚îÄ‚îÄ */
  .stats-row { display: flex; padding: 0 var(--px); border-bottom: 1px solid #f0f0f0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stat { padding: 18px 36px 18px 0; border-right: 1px solid #f0f0f0; margin-right: 36px; flex-shrink: 0; }
  .stat:last-child { border-right: none; }
  .stat .val { font-size: 24px; font-weight: 600; letter-spacing: -0.8px; white-space: nowrap; }
  .stat .lbl { font-size: 10.5px; color: #bbb; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.6px; }
  @media (max-width: 767px) {
    .stat { padding: 14px 24px 14px 0; margin-right: 24px; }
    .stat .val { font-size: 20px; }
  }

  /* ‚îÄ‚îÄ Chart ‚îÄ‚îÄ */
  .chart-section { border-bottom: 1px solid #f0f0f0; }
  .chart-controls { padding: 12px var(--px); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
  .chart-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid #e8e8e8; background: #fff; cursor: pointer; color: #999; transition: all 0.15s; white-space: nowrap; }
  .chart-canvas-wrap { padding: 4px var(--px) 20px; overflow: hidden; }
  #chart-canvas { display: block; cursor: crosshair; touch-action: none; max-width: 100%; }
  #chart-tip { position: fixed; background: #111; color: #fff; font-size: 12px; line-height: 1.75; padding: 10px 14px; border-radius: 9px; pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 999; max-width: 200px; }

  /* ‚îÄ‚îÄ Controls ‚îÄ‚îÄ */
  .controls { padding: 12px var(--px); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; min-width: 0; }
  .sep { width: 1px; height: 18px; background: #e8e8e8; flex-shrink: 0; }
  .sort-label { font-size: 11px; color: #ccc; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .sort-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid #e8e8e8; background: #fff; cursor: pointer; color: #888; transition: all 0.15s; white-space: nowrap; }
  .sort-btn.active { background: #f2f2f2; color: #111; border-color: #ccc; font-weight: 500; }
  .date-label { font-size: 11px; color: #ccc; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .date-input { font-size: 12px; font-family: inherit; padding: 5px 12px; border-radius: 20px; border: 1px solid #e8e8e8; background: #fff; color: #555; cursor: pointer; outline: none; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; min-width: 0; max-width: 100%; }
  .date-input:hover { border-color: #ccc; }
  .date-input:focus { border-color: #999; }

  /* ‚îÄ‚îÄ Table (desktop) ‚îÄ‚îÄ */
  .table-wrap { padding: 0 calc(var(--px) - 8px) 64px; }
  .table-header {
    display: grid;
    grid-template-columns: 64px 1fr 56px 64px 80px 56px 84px 68px 60px;
    padding: 10px 8px; margin-top: 8px;
  }
  .table-header span { font-size: 10.5px; color: #ccc; text-transform: uppercase; letter-spacing: 0.6px; cursor: pointer; user-select: none; transition: color 0.15s; }
  .table-header span:hover { color: #888; }
  .table-header span.sorted { color: #111; font-weight: 600; }
  .th-r { text-align: right; }

  .row { display: grid; grid-template-columns: 64px 1fr 56px 64px 80px 56px 84px 68px 60px; padding: 10px 8px; border-radius: 8px; transition: background 0.1s, opacity 0.15s; align-items: center; }
  .row:hover { background: #fafafa; }

  .rank-num { font-size: 14px; font-weight: 600; color: #111; }
  .name-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .name-text { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .change-cell { font-size: 13px; font-weight: 500; }
  .up   { color: #16a34a; }
  .down { color: #dc2626; }
  .flat { color: #ccc; }
  .c-r { text-align: right; font-size: 13px; color: #111; }
  .c-r.muted { color: #ddd; }
  .c-r.price-paid { font-weight: 500; }

  /* ‚îÄ‚îÄ Mobile cards (replaces table on small screens) ‚îÄ‚îÄ */
  @media (max-width: 639px) {
    .table-header { display: none; }
    #rows-container { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; }
    .row {
      display: flex; flex-direction: column; gap: 0;
      border: 1px solid #f0f0f0; border-radius: 12px;
      padding: 14px 16px; background: #fff;
    }
    .row:hover { background: #fafafa; }
    .row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .row-bottom { display: flex; gap: 16px; flex-wrap: wrap; }
    .rank-num { font-size: 13px; font-weight: 600; color: #aaa; }
    .name-text { font-size: 15px; font-weight: 600; }
    .change-cell { font-size: 13px; font-weight: 500; }
    .c-r { text-align: left; font-size: 13px; }
    .card-field { display: flex; flex-direction: column; gap: 1px; }
    .card-field .cf-lbl { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-field .cf-val { font-size: 14px; font-weight: 500; color: #111; }
    .card-field .cf-val.muted { color: #ddd; font-weight: 400; }
  }

  /* ‚îÄ‚îÄ Tooltip ‚îÄ‚îÄ */
  .tooltip { position: fixed; background: #111; color: #fff; font-size: 12px; line-height: 1.75; padding: 10px 14px; border-radius: 9px; pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 999; max-width: 230px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Easyfast ‚Äî Rank Tracker</h1>
    <div class="sub" id="date-sub">Loading‚Ä¶</div>
  </div>
  <label class="csv-drop" id="csv-drop">
    Drop updated CSV to refresh
    <input type="file" accept=".csv" id="csv-file-input">
  </label>
</div>

<div class="stats-row" id="stats-row"></div>

<!-- ‚îÄ‚îÄ Chart ‚îÄ‚îÄ -->
<div class="chart-section">
  <div class="chart-controls">
    <span class="sort-label">Templates</span>
    <div id="chart-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    <div class="sep"></div>
    <span class="date-label">From</span>
    <input type="date" class="date-input" id="chart-from" onchange="setChartRange('from',this.value)">
    <span class="date-label">To</span>
    <input type="date" class="date-input" id="chart-to" onchange="setChartRange('to',this.value)">
  </div>
  <div class="chart-canvas-wrap">
    <canvas id="chart-canvas"></canvas>
  </div>
</div>
<div id="chart-tip"></div>

<div class="controls">
  <span class="sort-label">Rank</span>
  <button class="sort-btn active" id="rm-weekly"  onclick="setRankMode('weekly')">Last Week</button>
  <button class="sort-btn"        id="rm-alltime" onclick="setRankMode('alltime')">All Time</button>
  <div class="sep"></div>
  <span class="date-label">Date</span>
  <input type="date" class="date-input" id="date-picker" onchange="onDatePick(this.value)">
  <div class="sep"></div>
  <span class="sort-label">Sort</span>
  <button class="sort-btn"        id="sb-rank"     onclick="setSort('rank')">Rank</button>
  <button class="sort-btn"        id="sb-name"     onclick="setSort('name')">Name</button>
  <button class="sort-btn"        id="sb-orders"   onclick="setSort('orders')">Orders</button>
  <button class="sort-btn active" id="sb-revenue"  onclick="setSort('revenue')">Revenue</button>
</div>

<div class="table-wrap">
  <div class="table-header">
    <span               id="th-rank"       onclick="setSort('rank')">Rank</span>
    <span               id="th-name"       onclick="setSort('name')">Template</span>
    <span               id="th-change">1d</span>
    <span class="th-r"  id="th-price"      onclick="setSort('price')">Price</span>
    <span class="th-r"  id="th-checkouts"  onclick="setSort('checkouts')">Checkouts</span>
    <span class="th-r"  id="th-orders"     onclick="setSort('orders')">Orders</span>
    <span class="th-r sorted" id="th-revenue" onclick="setSort('revenue')">Revenue</span>
    <span class="th-r"  id="th-conversion" onclick="setSort('conversion')">Conv.</span>
    <span class="th-r"  id="th-visitors"   onclick="setSort('visitors')">Visitors</span>
  </div>
  <div id="rows-container"></div>
</div>

<div class="tooltip" id="tip"></div>

<script>
// ‚îÄ‚îÄ STATE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
let currentSort = 'revenue', sortDir = -1;
let selectedDate = null, allData = [], dates = [], templates = [];
let rankMode = 'weekly'; // 'weekly' or 'alltime'

// ‚îÄ‚îÄ PARSE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function parseCSV(csv) {
  const lines = csv.trim().split('\n').filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
}

function buildTemplates(rows, forDate) {
  const byName = {};
  rows.forEach(r => {
    if (!byName[r.template]) byName[r.template] = [];
    byName[r.template].push(r);
  });
  return Object.entries(byName).map(([name, hist]) => {
    hist.sort((a, b) => a.date.localeCompare(b.date));
    const snap = hist.find(r => r.date === forDate) || hist[hist.length - 1];
    return {
      name,
      rank:       parseInt(snap.rank) || 0,
      change_1d:  parseInt(snap.change_1d) || 0,
      price_type: snap.price_type,
      price:      parseFloat(snap.price) || 0,
      checkouts:  snap.checkouts  !== '' ? parseInt(snap.checkouts)    : null,
      orders:     snap.orders     !== '' ? parseInt(snap.orders)       : null,
      revenue:    snap.revenue    !== '' ? parseFloat(snap.revenue)    : null,
      conversion: snap.conversion !== '' ? parseFloat(snap.conversion) : null,
      visitors:      snap.visitors      !== undefined && snap.visitors      !== '' ? parseInt(snap.visitors)      : null,
      rank_weekly:   parseInt(snap.rank_weekly) || 0,
      change_1d_weekly: parseInt(snap.change_1d_weekly) || 0,
    };
  });
}

// Helper: get the active rank/change based on current rankMode
function getRank(t) { return rankMode === 'weekly' ? t.rank_weekly : t.rank; }
function getChange(t) { return rankMode === 'weekly' ? t.change_1d_weekly : t.change_1d; }

function loadData(csvText) {
  allData = parseCSV(csvText);
  dates = [...new Set(allData.map(r => r.date))].sort();
  selectedDate = dates[dates.length - 1];
  templates = buildTemplates(allData, selectedDate);

  const picker = document.getElementById('date-picker');
  picker.min = dates[0];
  picker.max = dates[dates.length - 1];
  picker.value = selectedDate;

  renderAll();
  initChart();
}

// ‚îÄ‚îÄ STATS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function renderStats() {
  const paid = templates.filter(t => t.price_type === 'paid');
  const dayRev = paid.reduce((s, t) => s + (t.revenue    || 0), 0);
  const dayOrd = paid.reduce((s, t) => s + (t.orders     || 0), 0);
  const dayChk = paid.reduce((s, t) => s + (t.checkouts  || 0), 0);

  const monthPrefix = selectedDate.slice(0, 7);
  const monthName   = new Date(selectedDate + 'T00:00:00').toLocaleString('en', { month: 'long', year: 'numeric' });
  const monthRows   = allData.filter(r => r.date.startsWith(monthPrefix) && r.price_type === 'paid');
  const seen = new Set();
  const uniqueMonthRows = monthRows.filter(r => {
    const key = r.date + '|' + r.template;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  const monthRev = uniqueMonthRows.reduce((s, r) => s + (parseFloat(r.revenue) || 0), 0);
  const monthOrd = uniqueMonthRows.reduce((s, r) => s + (parseInt(r.orders)    || 0), 0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="val">$${dayRev.toLocaleString()}</div><div class="lbl">Day Revenue</div></div>
    <div class="stat"><div class="val">${dayOrd}</div><div class="lbl">Day Orders</div></div>
    <div class="stat"><div class="val">${dayChk}</div><div class="lbl">Day Checkouts</div></div>
    <div class="stat"><div class="val">$${monthRev.toLocaleString()}</div><div class="lbl">${monthName}</div></div>
    <div class="stat"><div class="val">${monthOrd}</div><div class="lbl">Month Orders</div></div>
  `;

  const paidCount = paid.length;
  document.getElementById('date-sub').textContent =
    `${selectedDate}  ¬∑  ${paidCount} paid templates  ¬∑  ${dates.length} days tracked`;
}

// ‚îÄ‚îÄ DATE PICKER ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function onDatePick(val) {
  if (!val) return;
  const nearest = dates.reduce((prev, cur) =>
    Math.abs(cur.localeCompare(val)) < Math.abs(prev.localeCompare(val)) ? cur : prev
  );
  selectedDate = nearest;
  document.getElementById('date-picker').value = nearest;
  templates = buildTemplates(allData, selectedDate);
  renderStats();
  renderRows();
}

// ‚îÄ‚îÄ TABLE / CARD ROWS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const isMobile = () => window.innerWidth < 640;

function getPaidSorted() {
  const data = templates.filter(t => t.price_type === 'paid');
  const s = currentSort;
  return [...data].sort((a, b) => {
    let av, bv;
    if      (s==='rank')    { av=getRank(a);           bv=getRank(b); }
    else if (s==='name')    { av=a.name.toLowerCase(); bv=b.name.toLowerCase(); }
    else if (s==='price')   { av=a.price;              bv=b.price; }
    else if (s==='checkouts'){av=a.checkouts??-1;      bv=b.checkouts??-1; }
    else if (s==='orders')  { av=a.orders??-1;         bv=b.orders??-1; }
    else if (s==='revenue') { av=a.revenue??-1;        bv=b.revenue??-1; }
    else if (s==='conversion'){av=a.conversion??-1;    bv=b.conversion??-1; }
    else if (s==='visitors') { av=a.visitors??-1;      bv=b.visitors??-1;   }
    else                    { av=a.rank;               bv=b.rank; }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    // Secondary sort: by rank ascending (lower rank = better)
    const ar = getRank(a) || 99999, br = getRank(b) || 99999;
    return ar - br;
  });
}

function m(val, prefix='') {
  if (val === null || val === undefined || val === '') return `<div class="c-r muted">‚Äî</div>`;
  return `<div class="c-r">${prefix}${typeof val==='number' ? val.toLocaleString() : val}</div>`;
}

function renderRows() {
  const data = getPaidSorted();
  if (isMobile()) {
    // Card layout
    document.getElementById('rows-container').innerHTML = data.map(t => {
      const rk = getRank(t);
      const ch = getChange(t);
      const cls = ch > 0 ? 'up' : ch < 0 ? 'down' : 'flat';
      const chStr = ch > 0 ? `‚Üë${ch}` : ch < 0 ? `‚Üì${Math.abs(ch)}` : '‚Äî';
      const ordVal  = t.orders  !== null ? t.orders  : '‚Äî';
      const revVal  = t.revenue !== null ? `$${t.revenue.toLocaleString()}` : '‚Äî';
      const chkVal  = t.checkouts !== null ? t.checkouts : '‚Äî';
      const convVal = (t.conversion !== null && t.conversion > 0) ? `${t.conversion.toFixed(1)}%` : '‚Äî';
      const priceLbl = `$${t.price}`;
      return `<div class="row" data-template="${t.name}">
        <div class="row-top">
          <div class="name-cell"><span class="name-text">${t.name}</span></div>
          <div class="change-cell ${cls}">${chStr}</div>
        </div>
        <div class="row-bottom">
          <div class="card-field"><span class="cf-lbl">Rank</span><span class="cf-val">${rk ? '#'+rk.toLocaleString() : '‚Äî'}</span></div>
          <div class="card-field"><span class="cf-lbl">Price</span><span class="cf-val">${priceLbl}</span></div>
          <div class="card-field"><span class="cf-lbl">Orders</span><span class="cf-val ${ordVal==='‚Äî'?'muted':''}">${ordVal}</span></div>
          <div class="card-field"><span class="cf-lbl">Revenue</span><span class="cf-val ${revVal==='‚Äî'?'muted':''}">${revVal}</span></div>
          <div class="card-field"><span class="cf-lbl">Checkouts</span><span class="cf-val ${chkVal==='‚Äî'?'muted':''}">${chkVal}</span></div>
          <div class="card-field"><span class="cf-lbl">Conv.</span><span class="cf-val ${convVal==='‚Äî'?'muted':''}">${convVal}</span></div>
          <div class="card-field"><span class="cf-lbl">Visitors</span><span class="cf-val ${t.visitors===null?'muted':''}">${t.visitors !== null ? t.visitors : '‚Äî'}</span></div>
        </div>
      </div>`;
    }).join('');
  } else {
    // Desktop grid layout
    document.getElementById('rows-container').innerHTML = data.map(t => {
      const rk = getRank(t);
      const ch = getChange(t);
      const cls = ch > 0 ? 'up' : ch < 0 ? 'down' : 'flat';
      const chStr = ch > 0 ? `‚Üë${ch}` : ch < 0 ? `‚Üì${Math.abs(ch)}` : '‚Äî';
      const priceStr = `<div class="c-r price-paid">$${t.price}</div>`;
      const convStr = (t.conversion !== null && t.conversion > 0)
        ? `<div class="c-r">${t.conversion.toFixed(1)}%</div>`
        : `<div class="c-r muted">‚Äî</div>`;
      const td = encodeURIComponent(JSON.stringify({
        rank:rk, change:ch, price:t.price,
        checkouts:t.checkouts, orders:t.orders, revenue:t.revenue, conversion:t.conversion, visitors:t.visitors
      }));
      return `<div class="row" data-template="${t.name}"
        onmouseenter="showTip(event,'${t.name}','${td}')"
        onmousemove="moveTip(event)" onmouseleave="hideTip()">
        <div class="rank-num">${rk ? '#'+rk.toLocaleString() : '‚Äî'}</div>
        <div class="name-cell"><span class="name-text">${t.name}</span></div>
        <div class="change-cell ${cls}">${chStr}</div>
        ${priceStr}
        ${m(t.checkouts)}
        ${m(t.orders)}
        ${m(t.revenue,'$')}
        ${convStr}
        ${m(t.visitors)}
      </div>`;
    }).join('');
  }
}

// ‚îÄ‚îÄ TOOLTIP ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const tip = document.getElementById('tip');
function showTip(e, name, enc) {
  const d = JSON.parse(decodeURIComponent(enc));
  let h = `<strong>${name}</strong><br>Rank #${d.rank.toLocaleString()}`;
  if (d.change !== 0) {
    const col = d.change > 0 ? '#4ade80' : '#f87171';
    h += ` <span style="color:${col}">${d.change>0?'‚Üë':'‚Üì'}${Math.abs(d.change)}</span>`;
  }
  h += `<br>Price $${d.price}`;
  if (d.checkouts !== null) h += `<br>Checkouts: ${d.checkouts}`;
  if (d.orders    !== null) h += `<br>Orders: ${d.orders}`;
  if (d.revenue   !== null) h += `<br>Revenue: $${d.revenue}`;
  if (d.conversion && d.conversion > 0) h += `<br>Conv: ${d.conversion.toFixed(1)}%`;
  if (d.visitors   !== null && d.visitors !== undefined) h += `<br>Visitors: ${d.visitors}`;
  tip.innerHTML = h; tip.style.opacity = '1'; moveTip(e);
  if (hoveredTemplate !== name) { hoveredTemplate = name; renderChart(); highlightTableRow(name); }
}
function moveTip(e) { tip.style.left=(e.clientX+16)+'px'; tip.style.top=(e.clientY-10)+'px'; }
function hideTip()  {
  tip.style.opacity='0';
  if (hoveredTemplate) { hoveredTemplate = null; renderChart(); highlightTableRow(null); }
}

function highlightTableRow(name) {
  document.querySelectorAll('#rows-container .row').forEach(row => {
    if (!name) { row.style.opacity = ''; return; }
    const rowName = row.getAttribute('data-template');
    row.style.opacity = rowName === name ? '1' : '0.2';
  });
}

// ‚îÄ‚îÄ CHART ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
let chartSelectedTemplates = new Set();
let chartFromDate = '', chartToDate = '';
let chartHitTargets = [];
let chartLogicalW = 0, chartLogicalH = 0;
let hoveredTemplate = null;

const CHART_COLORS = [
  { line: '#111111', barFill: 'rgba(17,17,17,0.18)',    barStroke: 'rgba(17,17,17,0.50)'   },
  { line: '#6366f1', barFill: 'rgba(99,102,241,0.18)',  barStroke: 'rgba(99,102,241,0.55)' },
  { line: '#f59e0b', barFill: 'rgba(245,158,11,0.18)',  barStroke: 'rgba(245,158,11,0.55)' },
  { line: '#10b981', barFill: 'rgba(16,185,129,0.18)',  barStroke: 'rgba(16,185,129,0.55)' },
  { line: '#ef4444', barFill: 'rgba(239,68,68,0.18)',   barStroke: 'rgba(239,68,68,0.55)'  },
  { line: '#8b5cf6', barFill: 'rgba(139,92,246,0.18)',  barStroke: 'rgba(139,92,246,0.55)' },
  { line: '#06b6d4', barFill: 'rgba(6,182,212,0.18)',   barStroke: 'rgba(6,182,212,0.55)'  },
  { line: '#f97316', barFill: 'rgba(249,115,22,0.18)',  barStroke: 'rgba(249,115,22,0.55)' },
  { line: '#ec4899', barFill: 'rgba(236,72,153,0.18)',  barStroke: 'rgba(236,72,153,0.55)' },
  { line: '#84cc16', barFill: 'rgba(132,204,22,0.18)',  barStroke: 'rgba(132,204,22,0.55)' },
  { line: '#14b8a6', barFill: 'rgba(20,184,166,0.18)',  barStroke: 'rgba(20,184,166,0.55)' },
  { line: '#a855f7', barFill: 'rgba(168,85,247,0.18)',  barStroke: 'rgba(168,85,247,0.55)' },
];

function getPaidNames() {
  return [...new Set(allData.filter(r => r.price_type === 'paid').map(r => r.template))].sort();
}
function colorOf(name) {
  const i = getPaidNames().indexOf(name);
  return CHART_COLORS[Math.max(0, i) % CHART_COLORS.length];
}

function updatePillColors() {
  getPaidNames().forEach(name => {
    const btn = document.getElementById('cp-' + name);
    if (!btn) return;
    const c = colorOf(name);
    if (chartSelectedTemplates.has(name)) {
      btn.style.background  = c.line;
      btn.style.borderColor = c.line;
      btn.style.color       = '#fff';
    } else {
      btn.style.background  = '#fff';
      btn.style.borderColor = '#e8e8e8';
      btn.style.color       = '#bbb';
    }
  });
}

function toggleChartTemplate(name) {
  if (chartSelectedTemplates.has(name)) {
    if (chartSelectedTemplates.size > 1) chartSelectedTemplates.delete(name);
  } else {
    chartSelectedTemplates.add(name);
  }
  updatePillColors();
  renderChart();
}

function setChartRange(type, val) {
  if (type === 'from') chartFromDate = val || dates[0];
  if (type === 'to')   chartToDate   = val || dates[dates.length - 1];
  if (chartFromDate > chartToDate) {
    if (type === 'from') { chartFromDate = chartToDate; document.getElementById('chart-from').value = chartFromDate; }
    else                 { chartToDate = chartFromDate; document.getElementById('chart-to').value   = chartToDate;   }
  }
  renderChart();
}

function initChart() {
  const paid = getPaidNames();
  if (!paid.length) return;
  chartSelectedTemplates = new Set(paid);
  chartFromDate = dates[0];
  chartToDate   = dates[dates.length - 1];

  const fromEl = document.getElementById('chart-from');
  const toEl   = document.getElementById('chart-to');
  fromEl.min = toEl.min = dates[0];
  fromEl.max = toEl.max = dates[dates.length - 1];
  fromEl.value = chartFromDate;
  toEl.value   = chartToDate;

  document.getElementById('chart-pills').innerHTML = paid.map(name =>
    `<button class="chart-pill" id="cp-${name}" onclick="toggleChartTemplate('${name}')">${name}</button>`
  ).join('');
  updatePillColors();
  renderChart();
}

function renderChart() {
  const canvas = document.getElementById('chart-canvas');
  if (!canvas || !allData.length) return;
  const ctx  = canvas.getContext('2d');
  const dpr  = window.devicePixelRatio || 1;
  const wrap = canvas.parentElement;
  const wrapW = wrap.getBoundingClientRect().width || wrap.offsetWidth;
  const mobile = wrapW < 540;

  const W = Math.floor(wrapW);
  const H = mobile ? 210 : 300;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  chartLogicalW = W;
  chartLogicalH = H;

  const rangeDates = dates.filter(d => d >= chartFromDate && d <= chartToDate);
  if (!rangeDates.length) return;

  const visibleNames = getPaidNames().filter(n => chartSelectedTemplates.has(n));
  if (!visibleNames.length) return;

  // Data map
  const dataMap = {};
  visibleNames.forEach(name => {
    dataMap[name] = {};
    rangeDates.forEach(d => {
      const row = allData.find(r => r.date === d && r.template === name);
      if (row) {
        const rkVal = rankMode === 'weekly' ? (parseInt(row.rank_weekly) || 0) : (parseInt(row.rank) || 0);
        dataMap[name][d] = {
          rank:     rkVal,
          orders:   parseInt(row.orders)    || 0,
          revenue:  parseFloat(row.revenue) || 0,
          visitors: row.visitors !== undefined && row.visitors !== '' ? (parseInt(row.visitors) || 0) : null,
        };
      }
    });
  });

  // Axis ranges (rank=0 means "unranked" ‚Äî exclude from scale, draw at bottom)
  let rankMin = Infinity, rankMax = -Infinity, ordersMax = 0, visitorsMax = 0;
  visibleNames.forEach(name => rangeDates.forEach(d => {
    const pt = dataMap[name][d];
    if (!pt) return;
    if (pt.rank > 0) { rankMin = Math.min(rankMin, pt.rank); rankMax = Math.max(rankMax, pt.rank); }
    ordersMax = Math.max(ordersMax, pt.orders);
    if (pt.visitors !== null) visitorsMax = Math.max(visitorsMax, pt.visitors);
  }));
  if (!isFinite(rankMin)) { rankMin = 1; rankMax = 100; }
  const rng = rankMax - rankMin || 50;
  rankMin = Math.max(1, rankMin - rng * 0.2);
  rankMax = rankMax + rng * 0.2;
  ordersMax   = Math.max(2, ordersMax + 1);
  visitorsMax = Math.max(5, visitorsMax + Math.ceil(visitorsMax * 0.15));

  // Layout ‚Äî smaller padding on mobile
  const PAD = {
    top:    20,
    right:  mobile ? 36 : 54,
    bottom: mobile ? 42 : 52,
    left:   mobile ? 52 : 70,
  };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;
  const fSz = mobile ? 9 : 10;

  const xOf     = i => PAD.left + (rangeDates.length === 1 ? cW / 2 : (i / (rangeDates.length - 1)) * cW);
  const yOfRank = r => r === 0 ? PAD.top + cH : PAD.top + ((r - rankMin) / (rankMax - rankMin)) * cH;
  const yOfOrd  = o => PAD.top  + cH - (o / ordersMax) * cH;
  const yOfVis  = v => PAD.top  + cH - (v / visitorsMax) * cH;

  // Grid
  ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 1;
  const numGrid = 4;
  for (let i = 0; i <= numGrid; i++) {
    const y = PAD.top + (i / numGrid) * cH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + cW, y); ctx.stroke();
  }

  // Left axis: Rank
  ctx.font = `${fSz}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.fillStyle = '#bbb'; ctx.textAlign = 'right';
  for (let i = 0; i <= numGrid; i++) {
    const y   = PAD.top + (i / numGrid) * cH;
    const val = Math.round(rankMin + (i / numGrid) * (rankMax - rankMin));
    ctx.fillText('#' + val.toLocaleString(), PAD.left - 6, y + 3.5);
  }

  // Right axis: Visitors (dashed, semi-transparent)
  ctx.textAlign = 'left';
  ctx.globalAlpha = 0.5;
  const visStep = visitorsMax <= 10 ? 2 : visitorsMax <= 50 ? 10 : visitorsMax <= 200 ? 50 : 100;
  for (let v = 0; v <= visitorsMax; v += visStep) {
    const y = yOfVis(v);
    if (y < PAD.top - 5 || y > PAD.top + cH + 5) continue;
    ctx.fillText(v, PAD.left + cW + 6, y + 3.5);
  }
  ctx.globalAlpha = 1;

  // X axis labels
  ctx.textAlign = 'center';
  rangeDates.forEach((d, i) => {
    const lbl = new Date(d + 'T12:00:00').toLocaleDateString('en', { month: 'short', day: 'numeric' });
    ctx.fillText(lbl, xOf(i), H - PAD.bottom + (mobile ? 14 : 18));
  });

  // Axis rotated labels
  if (!mobile) {
    ctx.fillStyle = '#ddd'; ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.save(); ctx.translate(11, PAD.top + cH / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('RANK', 0, 0); ctx.restore();
    ctx.globalAlpha = 0.5;
    ctx.save(); ctx.translate(W - 9, PAD.top + cH / 2); ctx.rotate(Math.PI / 2); ctx.fillText('VISITORS', 0, 0); ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Bars
  const ht = hoveredTemplate;
  const barGroupW = Math.min(cW / (rangeDates.length || 1) * (mobile ? 0.5 : 0.6), mobile ? 54 : 78);
  const barW = barGroupW / visibleNames.length;
  rangeDates.forEach((d, di) => {
    const cx = xOf(di);
    visibleNames.forEach((name, ni) => {
      const pt = dataMap[name][d];
      if (!pt || pt.orders === 0) return;
      const c   = colorOf(name);
      const dimmed = ht && ht !== name;
      ctx.globalAlpha = dimmed ? 0.1 : 1;
      const bx  = cx - barGroupW / 2 + ni * barW;
      const by  = yOfOrd(pt.orders);
      const bh  = PAD.top + cH - by;
      const bwi = barW - 2;

      ctx.fillStyle   = c.barFill;
      ctx.strokeStyle = c.barStroke;
      ctx.lineWidth   = 1;
      ctx.fillRect(bx, by, bwi, bh);
      ctx.strokeRect(bx, by, bwi, bh);

      // Label inside bar
      ctx.save();
      ctx.translate(bx + bwi / 2, by + bh / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.font = `600 ${fSz}px -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillStyle    = c.line;
      ctx.globalAlpha  = dimmed ? 0.05 : 0.65;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const maxLen = bh - 6;
      const textW  = ctx.measureText(name).width;
      if (textW <= maxLen) ctx.fillText(name, 0, 0);
      else ctx.fillText(name.slice(0, Math.floor(name.length * maxLen / textW)), 0, 0);
      ctx.globalAlpha = 1;
      ctx.restore();
    });
  });

  // Rank lines + dots
  chartHitTargets = [];
  visibleNames.forEach(name => {
    const c   = colorOf(name);
    const dimmed = ht && ht !== name;
    ctx.globalAlpha = dimmed ? 0.1 : 1;
    const pts = rangeDates.map((d, i) => {
      const pt = dataMap[name][d];
      return pt ? { x: xOf(i), y: yOfRank(pt.rank), rank: pt.rank, orders: pt.orders, revenue: pt.revenue, date: d, visitors: pt.visitors } : null;
    });
    ctx.strokeStyle = c.line; ctx.lineWidth = dimmed ? 1.5 : 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    let started = false;
    pts.forEach(p => { if (!p) return; if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y); });
    ctx.stroke();
    pts.forEach(p => {
      if (!p) return;
      ctx.beginPath(); ctx.arc(p.x, p.y, mobile ? 3.5 : 4.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = c.line; ctx.lineWidth = 2; ctx.stroke();
      chartHitTargets.push({ x: p.x, y: p.y, name, rank: p.rank, orders: p.orders, revenue: p.revenue, date: p.date, visitors: p.visitors });
    });
    ctx.globalAlpha = 1;
  });

  // Visitors lines (same color, thin solid)
  if (visitorsMax > 0) {
    visibleNames.forEach(name => {
      const c = colorOf(name);
      const dimmed = ht && ht !== name;
      ctx.globalAlpha = dimmed ? 0.06 : 0.5;
      const pts = rangeDates.map((d, i) => {
        const pt = dataMap[name][d];
        return (pt && pt.visitors !== null) ? { x: xOf(i), y: yOfVis(pt.visitors), v: pt.visitors, date: d } : null;
      });
      const valid = pts.filter(Boolean);
      if (!valid.length) { ctx.globalAlpha = 1; return; }
      ctx.strokeStyle = c.line; ctx.lineWidth = 1; ctx.lineJoin = 'round';
      ctx.beginPath();
      let started = false;
      pts.forEach(p => { if (!p) return; if (!started) { ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y); });
      ctx.stroke();
      // small dots
      valid.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, mobile ? 2 : 2.5, 0, Math.PI * 2);
        ctx.fillStyle = c.line; ctx.fill();
        chartHitTargets.push({ x: p.x, y: p.y, name, visitors: p.v, date: p.date, _visitorHit: true });
      });
      ctx.globalAlpha = 1;
    });
  }

  // Legend
  const legendY = H - PAD.bottom + (mobile ? 28 : 36);
  let lx = PAD.left;
  ctx.font = `${fSz + 1}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textAlign = 'left';
  visibleNames.forEach(name => {
    const c = colorOf(name);
    const dimmed = ht && ht !== name;
    ctx.globalAlpha = dimmed ? 0.15 : 1;
    ctx.strokeStyle = c.line; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx, legendY - 3.5); ctx.lineTo(lx + 12, legendY - 3.5); ctx.stroke();
    ctx.beginPath(); ctx.arc(lx + 6, legendY - 3.5, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = c.line; ctx.stroke();
    ctx.fillStyle = '#888'; ctx.fillText(name, lx + 18, legendY);
    lx += ctx.measureText(name).width + (mobile ? 28 : 40);
    ctx.globalAlpha = 1;
  });
}

// ‚îÄ‚îÄ Chart hover / touch tooltip ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
(function setupChartInteraction() {
  const canvas   = document.getElementById('chart-canvas');
  const chartTip = document.getElementById('chart-tip');

  function showNearest(cx, cy, pageX, pageY) {
    let nearest = null, minDist = 28;
    chartHitTargets.forEach(h => {
      const d = Math.hypot(h.x - cx, h.y - cy);
      if (d < minDist) { minDist = d; nearest = h; }
    });
    const newHover = nearest ? nearest.name : null;
    if (newHover !== hoveredTemplate) {
      hoveredTemplate = newHover;
      renderChart();
      highlightTableRow(newHover);
    }
    if (nearest) {
      const lbl = new Date(nearest.date + 'T12:00:00').toLocaleDateString('en', { month: 'short', day: 'numeric' });
      if (nearest._visitorHit) {
        chartTip.innerHTML = `<strong>${nearest.name}</strong> ¬∑ ${lbl}<br>Visitors: ${nearest.visitors}`;
      } else {
        let html = `<strong>${nearest.name}</strong> ¬∑ ${lbl}<br>Rank #${nearest.rank.toLocaleString()}<br>Orders: ${nearest.orders}`;
        if (nearest.revenue > 0) html += `<br>Revenue: $${nearest.revenue.toLocaleString()}`;
        if (nearest.visitors != null) html += `<br>Visitors: ${nearest.visitors}`;
        chartTip.innerHTML = html;
      }
      chartTip.style.opacity = '1';
      chartTip.style.left = Math.min(pageX + 16, window.innerWidth - 220) + 'px';
      chartTip.style.top  = (pageY - 10) + 'px';
    } else {
      chartTip.style.opacity = '0';
    }
  }

  function canvasCoords(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    return [
      (clientX - r.left) * chartLogicalW / r.width,
      (clientY - r.top)  * chartLogicalH / r.height
    ];
  }

  canvas.addEventListener('mousemove', e => {
    const [cx, cy] = canvasCoords(e.clientX, e.clientY);
    showNearest(cx, cy, e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseleave', () => {
    chartTip.style.opacity = '0';
    if (hoveredTemplate) { hoveredTemplate = null; renderChart(); highlightTableRow(null); }
  });

  // Touch support
  canvas.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const [cx, cy] = canvasCoords(t.clientX, t.clientY);
    showNearest(cx, cy, t.clientX, t.clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', () => {
    setTimeout(() => {
      chartTip.style.opacity = '0';
      if (hoveredTemplate) { hoveredTemplate = null; renderChart(); highlightTableRow(null); }
    }, 1500);
  });
})();

window.addEventListener('resize', () => { renderRows(); renderChart(); });

// ‚îÄ‚îÄ CSV DROP ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const dropZone = document.getElementById('csv-drop');
const fileInput = document.getElementById('csv-file-input');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0]; if (f) readFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });
function readFile(f) {
  const r = new FileReader();
  r.onload = ev => { loadData(ev.target.result); dropZone.textContent = '‚úì ' + f.name; };
  r.readAsText(f);
}

// ‚îÄ‚îÄ INIT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function renderAll() { renderStats(); renderRows(); }

// Fetch both CSVs and merge: ranks (auto-parsed) + visitors (manual).
(function init() {
  const sub = document.getElementById('date-sub');

  function fetchCSV(url) {
    return fetch(url, { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => text.trim());
  }

  function mergeVisitors(ranksCsv, visitorsCsv) {
    // Parse visitors into a lookup: "date|template" ‚Üí visitors
    const vMap = {};
    if (visitorsCsv) {
      const vLines = visitorsCsv.split('\n').filter(l => l.trim());
      const vHeaders = vLines[0].split(',').map(h => h.trim());
      const di = vHeaders.indexOf('date'), ti = vHeaders.indexOf('template'), vi = vHeaders.indexOf('visitors');
      if (di >= 0 && ti >= 0 && vi >= 0) {
        vLines.slice(1).forEach(line => {
          const vals = line.split(',');
          vMap[vals[di].trim() + '|' + vals[ti].trim()] = vals[vi].trim();
        });
      }
    }
    // Append visitors column to ranks CSV
    const lines = ranksCsv.split('\n').filter(l => l.trim());
    const header = lines[0] + ',visitors';
    const rows = lines.slice(1).map(line => {
      const vals = line.split(',');
      const key = vals[0].trim() + '|' + vals[1].trim();
      return line + ',' + (vMap[key] || '');
    });
    return header + '\n' + rows.join('\n');
  }

  Promise.all([
    fetchCSV('easyfast_ranks_history.csv'),
    fetchCSV('easyfast_visitors.csv').catch(() => null)  // visitors is optional
  ]).then(([ranksCsv, visitorsCsv]) => {
    const merged = mergeVisitors(ranksCsv, visitorsCsv);
    console.log('‚úÖ Data loaded ‚Äî ranks + ' + (visitorsCsv ? 'visitors merged' : 'no visitors file'));
    loadData(merged);
  }).catch(err => {
    console.error('‚ùå Failed to load data:', err);
    if (sub) sub.textContent = '‚öÝ Could not load CSV files ‚Äî make sure they are in the same folder.';
  });
})();
</script>
